name: azure-servicebus
services:
  servicebus:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:2.0.0
    volumes:
      - ./etc/azure/servicebus-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json
    ports:
      - ${AZURE_SERVICEBUS_AMQP_PORT:-5672}:5672
      - ${AZURE_SERVICEBUS_HTTP_PORT:-5300}:5300
    environment:
      SQL_SERVER: mssql
      ACCEPT_EULA: ${ACCEPT_EULA}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    depends_on:
      - mssql
    networks:
      azure-servicebus:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-CU24-ubuntu-22.04
    networks:
      azure-servicebus:
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
networks:
  azure-servicebus:
